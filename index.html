<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المدير - صيدلية العابد</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e5799 0%, #2b8c5e 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 20px; }
        .header h1 { font-size: 28px; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .card-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; color: #1e5799; border-bottom: 2px solid #2b8c5e; padding-bottom: 8px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .search-box input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .search-box button { padding: 10px 20px; background: #2b8c5e; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .search-box button:hover { background: #216d48; }
        .filter-buttons { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-buttons button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .stats { background: #e3f2fd; padding: 10px; border-radius: 10px; margin-bottom: 15px; text-align: center; font-weight: bold; }
        .sync-status { background: #fff3cd; padding: 8px; border-radius: 8px; margin-bottom: 10px; text-align: center; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #1e5799; color: white; padding: 10px; font-size: 14px; }
        td { padding: 8px; border-bottom: 1px solid #ddd; text-align: center; font-size: 13px; }
        input { padding: 5px; border-radius: 5px; border: 1px solid #ccc; width: 80px; text-align: center; }
        button { background: #2b8c5e; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; margin: 2px; }
        .btn-wa { background: #25D366; }
        .btn-sms { background: #2196F3; }
        .btn-danger { background: #dc3545; }
        .btn-save-cloud { background: #17a2b8; }
        .btn-group { background: #128C7E; padding: 10px 20px; }
        .button-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .button-group button { flex: 1; }
        .footer { text-align: center; color: white; margin-top: 20px; font-size: 12px; }
        .empty { text-align: center; padding: 40px; color: #999; }
        .highlight-row { background: #fff8e1; }
        @media (max-width: 700px) {
            th, td { font-size: 11px; padding: 5px; }
            input { width: 60px; font-size: 10px; }
            button { padding: 5px 8px; font-size: 11px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>👑 لوحة المدير - صيدلية العابد</h1>
        <p>تحكم كامل | حفظ محلي + سحابي</p>
    </div>

    <div class="card">
        <div class="card-title">🔍 بحث سريع</div>
        <div class="search-box">
            <input type="text" id="searchId" placeholder="بحث برقم العميل">
            <input type="text" id="searchName" placeholder="بحث باسم العميل">
            <button onclick="searchCustomers()">🔍 بحث</button>
            <button onclick="clearSearch()">🗑️ مسح</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">📊 الفلترة</div>
        <div class="filter-buttons">
            <button id="showAllBtn" onclick="setFilter('all')" style="background:#2b8c5e; color:white;">👥 عرض جميع العملاء</button>
            <button id="showMovementBtn" onclick="setFilter('movement')" style="background:#FF9800; color:white; opacity:0.6;">📊 عملاء الحركة اليومية فقط</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title">☁️ التخزين</div>
        <div class="sync-status" id="syncStatus">✅ البيانات محفوظة محلياً</div>
        <div class="button-group">
            <button class="btn-save-cloud" onclick="saveToCloudNow()">☁️ حفظ البيانات في السحابة الآن</button>
            <button onclick="loadFromCloudNow()">📥 استرجاع من السحابة</button>
        </div>
        <div id="cloudMsg" style="text-align: center; margin-top: 10px; font-weight: bold;"></div>
    </div>

    <div class="card">
        <div class="card-title">👥 العملاء</div>
        <div class="stats" id="stats">📊 جاري التحميل...</div>
        <div style="overflow-x: auto;"><div id="customersTable"></div></div>
        <div class="button-group">
            <button onclick="addCustomer()">➕ إضافة عميل</button>
            <button onclick="exportToExcel()">📊 تصدير Excel</button>
            <button class="btn-group" onclick="sendGroupWhatsApp()">📱 إرسال للكل (واتساب)</button>
            <button class="btn-sms" onclick="sendGroupSMS()">✉️ إرسال للكل (رسائل)</button>
        </div>
    </div>
    <div class="footer">نظام مرسل الديون | صيدلية العابد | حفظ محلي + سحابي</div>
</div>

<script>
    // ========== الرابط الجديد المعدل بعد التحديث ==========
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyKz_2r2uFwkn8oSSF9sKcM14if_M2xnoLHuxowBmXhAjNxXo8rIiYQ0Ys4MYpXOjAL/exec";
    
    let customers = [];
    let searchId = "", searchName = "";
    let currentFilter = "all";

    // ========== الرسائل المعدلة ==========
    function getMovementMessage(customer, newTotal) {
        if (customer.debt > 0 && customer.paid > 0) {
            return `الاخ ${customer.name}، نود اعلامكم بان تم تقيد مبلغ ${customer.debt.toLocaleString()} ريال (فاتورة جديدة) وتم استلام مبلغ ${customer.paid.toLocaleString()} ريال (سداد) ليصبح اجمالي الرصيد عليكم ${newTotal.toLocaleString()} ريال.\n\nيرجى السداد بداية ونهاية كل شهر\n\n🏥 صيدلية العابد\nتعز - الحوبان - مدخل البريد\n📞 770066128`;
        } else if (customer.debt > 0) {
            return `الاخ ${customer.name}، نود اعلامكم بان تم تقيد مبلغ ${customer.debt.toLocaleString()} ريال (فاتورة جديدة) ليصبح اجمالي الرصيد عليكم ${newTotal.toLocaleString()} ريال.\n\nيرجى السداد بداية ونهاية كل شهر\n\n🏥 صيدلية العابد\nتعز - الحوبان - مدخل البريد\n📞 770066128`;
        } else if (customer.paid > 0) {
            return `الاخ ${customer.name}، نود اعلامكم بان تم استلام مبلغ ${customer.paid.toLocaleString()} ريال (سداد) ليصبح اجمالي الرصيد عليكم ${newTotal.toLocaleString()} ريال.\n\nيرجى السداد بداية ونهاية كل شهر\n\n🏥 صيدلية العابد\nتعز - الحوبان - مدخل البريد\n📞 770066128`;
        }
        return "";
    }

    function getReminderMessage(customer) {
        return `سلام الله عليكم يا ${customer.name}، لو سمحت ممكن تسديد الحساب نهاية شهر وبداية الشهر، الصيدلية صيدليتك بأي وقت.\nحسابك: ${(customer.totalDebt || 0).toLocaleString()} ريال\nصيدلية العابد`;
    }

    // ========== التخزين المحلي ==========
    function saveToLocal() {
        localStorage.setItem('pharmacy_customers', JSON.stringify(customers));
        document.getElementById('syncStatus').innerHTML = '✅ محلي: ' + new Date().toLocaleTimeString();
    }

    function loadFromLocal() {
        const saved = localStorage.getItem('pharmacy_customers');
        if (saved) {
            customers = JSON.parse(saved);
            renderTable();
            return true;
        }
        return false;
    }

    // ========== التخزين السحابي المطور لتفادي الـ CORS الخطأ ==========
    async function saveToCloudNow() {
        try {
            document.getElementById('cloudMsg').innerHTML = '⏳ جاري الحفظ في السحابة...';
            
            const formData = new URLSearchParams();
            formData.append('action', 'save');
            formData.append('customers', JSON.stringify(customers));

            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: formData,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });
            
            const result = await response.json();
            if (result.success) {
                document.getElementById('cloudMsg').innerHTML = '<span style="color: #2b8c5e;">✅ تم الحفظ في السحابة بنجاح!</span>';
            } else {
                document.getElementById('cloudMsg').innerHTML = '<span style="color: #dc3545;">❌ فشل الحفظ: ' + (result.error || '') + '</span>';
            }
        } catch(e) {
            document.getElementById('cloudMsg').innerHTML = '<span style="color: #dc3545;">❌ خطأ في الاتصال بالخادم السحابي</span>';
            console.error(e);
        }
        setTimeout(() => document.getElementById('cloudMsg').innerHTML = '', 5000);
    }

    async function loadFromCloudNow() {
        try {
            document.getElementById('syncStatus').innerHTML = '⏳ جاري التحميل من السحابة...';
            
            const formData = new URLSearchParams();
            formData.append('action', 'load');

            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: formData,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });
            
            const result = await response.json();
            if (result.success && result.customers) {
                customers = result.customers;
                saveToLocal();
                renderTable();
                document.getElementById('syncStatus').innerHTML = '✅ تم تحديث وتحميل البيانات من السحابة';
            } else {
                document.getElementById('syncStatus').innerHTML = '⚠️ لا توجد بيانات مسجلة في السحابة';
            }
        } catch(e) {
            document.getElementById('syncStatus').innerHTML = '⚠️ فشل الاتصال، تم عرض البيانات المحلية المتاحة';
            console.error(e);
        }
    }

    // ========== الفلترة ==========
    function setFilter(filter) {
        currentFilter = filter;
        const allBtn = document.getElementById('showAllBtn');
        const movementBtn = document.getElementById('showMovementBtn');
        if (filter === 'all') {
            allBtn.style.background = "#2b8c5e";
            allBtn.style.opacity = "1";
            movementBtn.style.background = "#FF9800";
            movementBtn.style.opacity = "0.6";
        } else {
            allBtn.style.background = "#2b8c5e";
            allBtn.style.opacity = "0.6";
            movementBtn.style.background = "#FF9800";
            movementBtn.style.opacity = "1";
        }
        renderTable();
    }

    function getFilteredCustomers() {
        let filtered = [...customers];
        if (searchId) filtered = filtered.filter(c => c.id.toString().includes(searchId));
        if (searchName) filtered = filtered.filter(c => c.name.includes(searchName));
        if (currentFilter === 'movement') {
            filtered = filtered.filter(c => (c.debt || 0) > 0 || (c.paid || 0) > 0);
        }
        return filtered;
    }

    // ========== عرض الجدول (تم تعديل الخطأ الإملائي هنا) ==========
    function renderTable() {
        const filtered = getFilteredCustomers();
        if (!filtered.length) {
            document.getElementById('customersTable').innerHTML = '<div class="empty">📭 لا يوجد عملاء مطابِقين للبحث</div>';
            document.getElementById('stats').innerHTML = `📊 إجمالي: ${customers.length} | معروض: 0 | 🔴 حركة اليوم: ${customers.filter(c => (c.debt||0)>0 || (c.paid||0)>0).length}`;
            return;
        }
        let html = `<table><thead><tr><th>#</th><th>الاسم</th><th>الجوال</th><th>الرصيد الرئيسي</th><th>فاتورة(+)</th><th>سداد(-)</th><th>الرصيد الجديد</th><th>إجراءات</th></tr></thead><tbody>`;
        for (let c of filtered) {
            const newTotal = (c.totalDebt || 0) + (c.debt || 0) - (c.paid || 0);
            const hasMovement = (c.debt || 0) > 0 || (c.paid || 0) > 0;
            html += `<tr class="${hasMovement ? 'highlight-row' : ''}">
                <td>${c.id}</td>
                <td><strong>${c.name}</strong></td>
                <td><input type="text" id="phone_${c.id}" value="${c.phone || ''}" style="width:100px"></td>
                <td><input type="number" id="balance_${c.id}" value="${c.totalDebt || 0}" step="any" style="width:75px"></td>
                <td><input type="number" id="debt_${c.id}" value="${c.debt || 0}" step="any" style="width:65px"></td>
                <td><input type="number" id="paid_${c.id}" value="${c.paid || 0}" step="any" style="width:65px"></td>
                <td id="new_${c.id}" style="color:#2b8c5e; font-weight:bold;">${newTotal.toLocaleString()}</td>
                <td>
                    <button onclick="updateCustomer(${c.id})">💾 حفظ</button>
                    <button class="btn-wa" onclick="sendWA(${c.id})">📱</button>
                    <button class="btn-sms" onclick="sendSMS(${c.id})">✉️</button>
                    <button class="btn-danger" onclick="deleteCustomer(${c.id})">🗑️</button>
                </td>
            </tr>`;
        }
        html += `</tbody></table>`; // تم تصحيح حرف (树) إلى وسم الإغلاق الصحيح للجدول هنا
        document.getElementById('customersTable').innerHTML = html;
        document.getElementById('stats').innerHTML = `📊 إجمالي: ${customers.length} | معروض: ${filtered.length} | 🔴 حركة اليوم: ${customers.filter(c => (c.debt||0)>0 || (c.paid||0)>0).length}`;
        
        for (let c of filtered) {
            if (document.getElementById(`debt_${c.id}`)) {
                document.getElementById(`debt_${c.id}`).oninput = () => updateNewTotal(c.id);
                document.getElementById(`paid_${c.id}`).oninput = () => updateNewTotal(c.id);
            }
        }
    }

    function updateNewTotal(id) {
        const c = customers.find(c => c.id == id);
        if (c) {
            const debt = parseFloat(document.getElementById(`debt_${id}`).value) || 0;
            const paid = parseFloat(document.getElementById(`paid_${id}`).value) || 0;
            const newTotal = (c.totalDebt || 0) + debt - paid;
            const newSpan = document.getElementById(`new_${id}`);
            if (newSpan) newSpan.innerHTML = newTotal.toLocaleString();
        }
    }

    // ========== تحديث العميل ==========
    async function updateCustomer(id) {
        const c = customers.find(c => c.id == id);
        if (c) {
            c.phone = document.getElementById(`phone_${id}`).value;
            
            const newDebt = parseFloat(document.getElementById(`debt_${id}`).value) || 0;
            const newPaid = parseFloat(document.getElementById(`paid_${id}`).value) || 0;
            const newBalance = parseFloat(document.getElementById(`balance_${id}`).value) || 0;
            
            if (newDebt > 0) c.debt = (c.debt || 0) + newDebt;
            if (newPaid > 0) c.paid = (c.paid || 0) + newPaid;
            
            if (newBalance !== (c.totalDebt || 0)) {
                c.totalDebt = newBalance;
            }
            
            document.getElementById(`debt_${id}`).value = 0;
            document.getElementById(`paid_${id}`).value = 0;
            document.getElementById(`balance_${id}`).value = c.totalDebt;
            
            saveToLocal();
            renderTable();
            alert(`✅ تم تحديث بيانات العميل: ${c.name}`);
        }
    }

    async function deleteCustomer(id) {
        if (confirm('هل أنت متأكد من حذف هذا العميل نهائياً من القائمة المحلية؟')) {
            customers = customers.filter(c => c.id != id);
            saveToLocal();
            renderTable();
            alert('✅ تم الحذف محلياً (اضغط حفظ السحابة لاعتماد الحذف هناك)');
        }
    }

    // ========== الإرسال ==========
    function sendWA(id) {
        const c = customers.find(c => c.id == id);
        if (!c || !c.phone) { alert('❌ رقم الهاتف غير موجود لهذا العميل'); return; }
        
        let msg = "";
        const newTotal = (c.totalDebt || 0) + (c.debt || 0) - (c.paid || 0);
        
        if ((c.debt || 0) > 0 || (c.paid || 0) > 0) {
            msg = getMovementMessage(c, newTotal);
        } else {
            msg = getReminderMessage(c);
        }
        
        let phone = c.phone.replace(/^0+/, '').replace(/^967/, '').replace(/[^0-9]/g, '');
        window.open(`https://wa.me/967${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function sendSMS(id) {
        const c = customers.find(c => c.id == id);
        if (!c || !c.phone) { alert('❌ رقم الهاتف غير موجود لهذا العميل'); return; }
        
        let msg = "";
        const newTotal = (c.totalDebt || 0) + (c.debt || 0) - (c.paid || 0);
        
        if ((c.debt || 0) > 0 || (c.paid || 0) > 0) {
            msg = getMovementMessage(c, newTotal);
        } else {
            msg = getReminderMessage(c);
        }
        
        let phone = c.phone.replace(/^0+/, '').replace(/^967/, '').replace(/[^0-9]/g, '');
        window.location.href = `sms:+967${phone}?body=${encodeURIComponent(msg)}`;
    }

    // ========== إرسال جماعي ==========
    async function sendGroupWhatsApp() {
        let targets = customers.filter(c => c.phone && c.phone.length >= 9 && ((c.debt || 0) > 0 || (c.paid || 0) > 0));
        if (!targets.length) {
            alert('❌ لا يوجد عملاء لديهم حركة مالية مسجلة اليوم للإرسال لهم');
            return;
        }
        for (let i = 0; i < targets.length; i++) {
            const c = targets[i];
            const newTotal = (c.totalDebt || 0) + (c.debt || 0) - (c.paid || 0);
            let msg = getMovementMessage(c, newTotal);
            let phone = c.phone.replace(/^0+/, '').replace(/^967/, '').replace(/[^0-9]/g, '');
            window.open(`https://wa.me/967${phone}?text=${encodeURIComponent(msg)}`, '_blank');
            if (i < targets.length - 1) {
                await new Promise(resolve => {
                    alert(`✅ تم فتح محادثة لـ ${c.name}\nاضغط (موافق/OK) لفتح العميل التالي تلقائياً`);
                    resolve();
                });
            }
        }
        alert('✅ تم الانتهاء من فتح روابط الإرسال لجميع العملاء المستهدفين');
    }

    async function sendGroupSMS() {
        let targets = customers.filter(c => c.phone && c.phone.length >= 9 && ((c.debt || 0) > 0 || (c.paid || 0) > 0));
        if (!targets.length) {
            alert('❌ لا يوجد عملاء لديهم حركة مالية مسجلة اليوم للإرسال لهم');
            return;
        }
        for (let i = 0; i < targets.length; i++) {
            const c = targets[i];
            const newTotal = (c.totalDebt || 0) + (c.debt || 0) - (c.paid || 0);
            let msg = getMovementMessage(c, newTotal);
            let phone = c.phone.replace(/^0+/, '').replace(/^967/, '').replace(/[^0-9]/g, '');
            window.location.href = `sms:+967${phone}?body=${encodeURIComponent(msg)}`;
            if (i < targets.length - 1) {
                await new Promise(resolve => {
                    alert(`✅ تم تجهيز الرسالة النصية لـ ${c.name}\nاضغط (موافق/OK) للعميل التالي`);
                    resolve();
                });
            }
        }
        alert('✅ تم الانتهاء من إرسال الرسائل لجميع العملاء');
    }

    // ========== إدارة العملاء ==========
    async function addCustomer() {
        let name = prompt('📝 اسم العميل الجديد:');
        if (!name) return;
        let phone = prompt('📞 رقم هاتف العميل (يفضل 9 أرقام بدون مفتاح الدولة):');
        if (!phone) return;
        let id = Date.now();
        customers.push({ 
            id: id, 
            name: name, 
            phone: phone.replace(/[^0-9]/g, ''), 
            totalDebt: 0, 
            debt: 0, 
            paid: 0 
        });
        saveToLocal();
        renderTable();
        alert('✅ تم إضافة العميل بنجاح للقائمة المؤقتة');
    }

    function exportToExcel() {
        if (!customers.length) { alert('لا توجد بيانات لتصديرها'); return; }
        let csv = "رقم العميل,اسم العميل,رقم الهاتف,الرصيد الحالي,فاتورة جديدة,سداد\n";
        for (let c of customers) {
            csv += `"${c.id}","${c.name}","${c.phone}","${c.totalDebt}","${c.debt || 0}","${c.paid || 0}"\n`;
        }
        const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `صيدلية_العابد_الديون_${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        URL.revokeObjectURL(blob);
    }

    function searchCustomers() {
        searchId = document.getElementById('searchId').value.trim();
        searchName = document.getElementById('searchName').value.trim();
        renderTable();
    }
    
    function clearSearch() {
        document.getElementById('searchId').value = '';
        document.getElementById('searchName').value = '';
        searchId = ""; searchName = "";
        renderTable();
    }

    // ========== ربط الدوال بالنظام العالمي للعمل بالصفحة ==========
    window.updateCustomer = updateCustomer;
    window.sendWA = sendWA;
    window.sendSMS = sendSMS;
    window.deleteCustomer = deleteCustomer;
    window.addCustomer = addCustomer;
    window.sendGroupWhatsApp = sendGroupWhatsApp;
    window.sendGroupSMS = sendGroupSMS;
    window.exportToExcel = exportToExcel;
    window.searchCustomers = searchCustomers;
    window.clearSearch = clearSearch;
    window.setFilter = setFilter;
    window.saveToCloudNow = saveToCloudNow;
    window.loadFromCloudNow = loadFromCloudNow;

    // ========== بدء التشغيل والتحميل التلقائي للملف ==========
    if (!loadFromLocal()) {
        customers = [];
    }
    renderTable();
</script>
</body>
</html>
