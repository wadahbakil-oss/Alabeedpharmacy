<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيدلية العابد</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e5799 0%, #2b8c5e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .card-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #1e5799;
            border-bottom: 2px solid #2b8c5e;
            padding-bottom: 8px;
        }
        .stats {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .search-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .search-box button {
            padding: 10px 20px;
            background: #2b8c5e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #1e5799;
            color: white;
            padding: 10px;
            font-size: 14px;
        }
        td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            text-align: center;
            font-size: 13px;
        }
        input {
            padding: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            width: 80px;
            text-align: center;
        }
        button {
            background: #2b8c5e;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin: 2px;
        }
        .btn-wa {
            background: #25D366;
        }
        .btn-group {
            background: #128C7E;
            padding: 10px 20px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .button-group button {
            flex: 1;
        }
        .footer {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.7;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        @media (max-width: 700px) {
            th, td { font-size: 11px; padding: 5px; }
            input { width: 60px; font-size: 10px; }
            button { padding: 5px 8px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 صيدلية العابد</h1>
            <p>نظام إدارة الديون والتواصل مع العملاء</p>
        </div>

        <div class="card">
            <div class="card-title">🔍 بحث سريع</div>
            <div class="search-box">
                <input type="text" id="searchId" placeholder="بحث برقم العميل">
                <input type="text" id="searchName" placeholder="بحث باسم العميل">
                <button onclick="searchCustomers()">🔍 بحث</button>
                <button onclick="clearSearch()">🗑️ مسح</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">👥 العملاء</div>
            <div class="stats" id="stats">📊 جاري التحميل...</div>
            
            <div style="overflow-x: auto;">
                <div id="customersTable"></div>
            </div>
            
            <div class="button-group">
                <button onclick="addCustomer()">➕ إضافة عميل جديد</button>
                <button onclick="exportToExcel()">📊 تصدير Excel</button>
                <button class="btn-group" onclick="sendGroupWhatsApp()">📱 إرسال للكل (واتساب)</button>
            </div>
        </div>

        <div class="footer">
            نظام مرسل الديون | صيدلية العابد
        </div>
    </div>

    <script>
        // ⚠️ ضع رابط Apps Script الخاص بك هنا ⚠️
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxVOeHhMBVUf8IyqWA_6Xf7XrZr-hiT4d-VzwrXBOvnUxRlzZ6aNmJ5KdhntSEn3PP_/exec";
        
        let customers = [];
        let searchId = "";
        let searchName = "";

        async function loadData() {
            try {
                document.getElementById('stats').innerHTML = '⏳ جاري التحميل من السحاب...';
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "load", pharmacyId: 1 }),
                    headers: { 'Content-Type': 'application/json' }
                });
                const result = await response.json();
                if (result.success && result.customers) {
                    customers = result.customers;
                } else {
                    customers = [];
                }
                renderTable();
            } catch(e) {
                document.getElementById('stats').innerHTML = '⚠️ لا يوجد اتصال بالسحاب، بيانات محلية فقط';
                customers = [];
                renderTable();
            }
        }

        async function saveData() {
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "save", pharmacyId: 1, customers: customers }),
                    headers: { 'Content-Type': 'application/json' }
                });
            } catch(e) {}
        }

        function getFilteredCustomers() {
            let filtered = [...customers];
            if (searchId) {
                filtered = filtered.filter(c => c.id.toString().includes(searchId));
            }
            if (searchName) {
                filtered = filtered.filter(c => c.name.includes(searchName));
            }
            return filtered;
        }

        function renderTable() {
            const filtered = getFilteredCustomers();
            
            if (!filtered.length) {
                document.getElementById('customersTable').innerHTML = '<div class="empty">📭 لا يوجد عملاء</div>';
                document.getElementById('stats').innerHTML = `📊 إجمالي العملاء: ${customers.length} | المعروضين: 0`;
                return;
            }

            let html = `<table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>العميل</th>
                        <th>رقم الجوال</th>
                        <th>الرصيد</th>
                        <th>فاتورة (+) </th>
                        <th>سداد (-) </th>
                        <th>الرصيد الجديد</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody>`;
            
            for (let c of filtered) {
                const newTotal = (c.totalDebt || 0) + (c.debt || 0) - (c.paid || 0);
                html += `
                    <tr>
                        <td>${c.id}</td>
                        <td><strong>${c.name}</strong></td>
                        <td><input type="text" id="phone_${c.id}" value="${c.phone || ''}" style="width:100px"></td>
                        <td><input type="number" id="balance_${c.id}" value="${c.totalDebt || 0}" step="any" style="width:75px"></td>
                        <td><input type="number" id="debt_${c.id}" value="0" step="any" style="width:65px" placeholder="+"></td>
                        <td><input type="number" id="paid_${c.id}" value="0" step="any" style="width:65px" placeholder="-"></td>
                        <td id="new_${c.id}" style="color:#2b8c5e; font-weight:bold;">${newTotal.toLocaleString()}</td>
                        <td>
                            <button onclick="updateCustomer(${c.id})">💾 حفظ</button>
                            <button class="btn-wa" onclick="sendWhatsApp(${c.id})">📱</button>
                        </td>
                    </tr>
                `;
            }
            html += `</tbody>树`;
            document.getElementById('customersTable').innerHTML = html;
            document.getElementById('stats').innerHTML = `📊 إجمالي العملاء: ${customers.length} | المعروضين: ${filtered.length}`;

            // ربط الأحداث
            for (let c of filtered) {
                if (document.getElementById(`debt_${c.id}`)) {
                    document.getElementById(`debt_${c.id}`).oninput = () => updateNewTotal(c.id);
                    document.getElementById(`paid_${c.id}`).oninput = () => updateNewTotal(c.id);
                }
            }
        }

        function updateNewTotal(id) {
            const c = customers.find(c => c.id == id);
            if (c) {
                const debt = parseFloat(document.getElementById(`debt_${id}`).value) || 0;
                const paid = parseFloat(document.getElementById(`paid_${id}`).value) || 0;
                const newTotal = (c.totalDebt || 0) + debt - paid;
                const newTotalSpan = document.getElementById(`new_${id}`);
                if (newTotalSpan) newTotalSpan.innerHTML = newTotal.toLocaleString();
            }
        }

        async function updateCustomer(id) {
            const c = customers.find(c => c.id == id);
            if (c) {
                c.phone = document.getElementById(`phone_${id}`).value;
                c.totalDebt = parseFloat(document.getElementById(`balance_${id}`).value) || 0;
                const debt = parseFloat(document.getElementById(`debt_${id}`).value) || 0;
                const paid = parseFloat(document.getElementById(`paid_${id}`).value) || 0;
                
                if (debt > 0) c.totalDebt += debt;
                if (paid > 0) c.totalDebt -= paid;
                
                document.getElementById(`debt_${id}`).value = 0;
                document.getElementById(`paid_${id}`).value = 0;
                document.getElementById(`balance_${id}`).value = c.totalDebt;
                
                await saveData();
                renderTable();
                alert(`✅ تم تحديث ${c.name}`);
            }
        }

        function sendWhatsApp(id) {
            const c = customers.find(c => c.id == id);
            if (c && c.phone) {
                let msg = `السلام عليكم يا ${c.name}، رصيدك الحالي: ${(c.totalDebt || 0).toLocaleString()} ريال\n🏥 صيدلية العابد`;
                let phone = c.phone.replace(/^0+/, '').replace(/^967/, '').replace(/[^0-9]/g, '');
                if (phone.length < 9) {
                    alert('رقم الهاتف غير صحيح');
                    return;
                }
                window.open(`https://wa.me/967${phone}?text=${encodeURIComponent(msg)}`, '_blank');
            } else {
                alert('❌ رقم الهاتف غير موجود');
            }
        }

        async function sendGroupWhatsApp() {
            let targets = customers.filter(c => c.phone && c.phone.length >= 9);
            if (!targets.length) {
                alert('❌ لا يوجد عملاء لديهم أرقام هواتف صحيحة');
                return;
            }
            
            for (let i = 0; i < targets.length; i++) {
                const c = targets[i];
                let msg = `السلام عليكم يا ${c.name}، رصيدك الحالي: ${(c.totalDebt || 0).toLocaleString()} ريال\n🏥 صيدلية العابد`;
                let phone = c.phone.replace(/^0+/, '').replace(/^967/, '').replace(/[^0-9]/g, '');
                window.open(`https://wa.me/967${phone}?text=${encodeURIComponent(msg)}`, '_blank');
                
                if (i < targets.length - 1) {
                    await new Promise(resolve => {
                        alert(`✅ تم إرسال رسالة لـ ${c.name}\nاضغط OK للمتابعة للعميل التالي`);
                        resolve();
                    });
                }
            }
            alert('✅ تم إرسال الرسائل لجميع العملاء');
        }

        async function addCustomer() {
            let name = prompt('📝 اسم العميل:');
            if (!name) return;
            let phone = prompt('📞 رقم الهاتف:');
            if (!phone) return;
            let id = Date.now();
            customers.push({
                id: id,
                name: name,
                phone: phone.replace(/[^0-9]/g, ''),
                totalDebt: 0,
                debt: 0,
                paid: 0
            });
            await saveData();
            renderTable();
            alert('✅ تم إضافة العميل');
        }

        function exportToExcel() {
            if (!customers.length) {
                alert('لا يوجد بيانات للتصدير');
                return;
            }
            let csv = "رقم العميل,اسم العميل,رقم الهاتف,الرصيد الحالي\n";
            for (let c of customers) {
                csv += `"${c.id}","${c.name}","${c.phone}","${c.totalDebt}"\n`;
            }
            const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `صيدلية_العابد_${new Date().toISOString().slice(0,19)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function searchCustomers() {
            searchId = document.getElementById('searchId').value.trim();
            searchName = document.getElementById('searchName').value.trim();
            renderTable();
        }

        function clearSearch() {
            document.getElementById('searchId').value = '';
            document.getElementById('searchName').value = '';
            searchId = "";
            searchName = "";
            renderTable();
        }

        // ربط الدوال
        window.updateCustomer = updateCustomer;
        window.sendWhatsApp = sendWhatsApp;
        window.addCustomer = addCustomer;
        window.sendGroupWhatsApp = sendGroupWhatsApp;
        window.exportToExcel = exportToExcel;
        window.searchCustomers = searchCustomers;
        window.clearSearch = clearSearch;

        // بدء التحميل
        loadData();
    </script>
</body>
</html>
