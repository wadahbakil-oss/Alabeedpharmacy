<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيدلية العابد</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e5799 0%, #2b8c5e 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .card-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #1e5799;
            border-bottom: 2px solid #2b8c5e;
            padding-bottom: 8px;
        }
        .stats {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: #1e5799;
            color: white;
            padding: 10px;
        }
        td {
            padding: 8px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }
        input {
            padding: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            width: 90px;
        }
        button {
            background: #2b8c5e;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin: 2px;
        }
        .btn-wa {
            background: #25D366;
        }
        .btn-group {
            background: #128C7E;
            padding: 10px 20px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .button-group button {
            flex: 1;
        }
        .footer {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 12px;
        }
        .error-msg {
            background: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 صيدلية العابد</h1>
            <p>نظام إدارة الديون والتواصل مع العملاء</p>
        </div>

        <div class="card">
            <div class="card-title">👥 إدارة العملاء</div>
            <div class="stats" id="stats">📊 جاري التحميل...</div>
            
            <div style="overflow-x: auto;">
                <div id="customersTable"></div>
            </div>
            
            <div class="button-group">
                <button onclick="addCustomer()">➕ إضافة عميل جديد</button>
                <button onclick="exportExcel()">📊 تصدير Excel</button>
                <button class="btn-group" onclick="sendGroupWA()">📱 إرسال للكل (واتساب)</button>
            </div>
        </div>

        <div class="footer">
            نظام مرسل الديون | صيدلية العابد
        </div>
    </div>

    <script>
        // ⚠️ ضع رابط Apps Script الخاص بك هنا
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzgPB-dNH7pKF5HhWP6zAwQsJ90-q_2arIH0kB2Njyn32ewQHDbocBCzP5TaVT8K9SMv/exec";
        
        let customers = [];

        async function loadData() {
            try {
                document.getElementById('stats').innerHTML = '⏳ جاري التحميل...';
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "load", pharmacyId: 1 }),
                    headers: { 'Content-Type': 'application/json' }
                });
                const data = await response.json();
                if (data.success && data.customers) {
                    customers = data.customers;
                } else {
                    customers = [];
                }
                renderTable();
            } catch(e) {
                document.getElementById('stats').innerHTML = '⚠️ جاري العمل بدون اتصال سحابي';
                customers = [];
                renderTable();
            }
        }

        async function saveData() {
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "save", pharmacyId: 1, customers: customers }),
                    headers: { 'Content-Type': 'application/json' }
                });
            } catch(e) {}
        }

        function renderTable() {
            if (!customers.length) {
                document.getElementById('customersTable').innerHTML = '<div style="text-align:center; padding:40px;">📭 لا يوجد عملاء، اضف عميلاً جديداً</div>';
                document.getElementById('stats').innerHTML = '📊 إجمالي العملاء: 0';
                return;
            }

            let html = `<table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>الاسم</th>
                        <th>الجوال</th>
                        <th>الرصيد الحالي</th>
                        <th>فاتورة جديدة</th>
                        <th>سداد</th>
                        <th>الرصيد الجديد</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody>`;
            
            for (let c of customers) {
                const newTotal = (c.totalDebt || 0) + (c.debt || 0) - (c.paid || 0);
                html += `
                    <tr>
                        <td>${c.id}</td>
                        <td><strong>${c.name}</strong></td>
                        <td><input type="text" id="phone_${c.id}" value="${c.phone || ''}" style="width:100px"></td>
                        <td><input type="number" id="balance_${c.id}" value="${c.totalDebt || 0}" style="width:80px"></td>
                        <td><input type="number" id="debt_${c.id}" value="0" style="width:70px" placeholder="+"></td>
                        <td><input type="number" id="paid_${c.id}" value="0" style="width:70px" placeholder="-"></td>
                        <td id="new_${c.id}">${newTotal.toLocaleString()}</td>
                        <td>
                            <button onclick="updateCustomer(${c.id})">💾 حفظ</button>
                            <button class="btn-wa" onclick="sendWA(${c.id})">📱 واتساب</button>
                        </td>
                    </tr>
                `;
            }
            html += `</tbody></table>`;
            document.getElementById('customersTable').innerHTML = html;
            document.getElementById('stats').innerHTML = `📊 إجمالي العملاء: ${customers.length}`;

            // تحديث الرصيد الجديد تلقائياً
            for (let c of customers) {
                if (document.getElementById(`debt_${c.id}`)) {
                    document.getElementById(`debt_${c.id}`).oninput = () => updateNewTotal(c.id);
                    document.getElementById(`paid_${c.id}`).oninput = () => updateNewTotal(c.id);
                }
            }
        }

        function updateNewTotal(id) {
            const c = customers.find(c => c.id == id);
            if (c) {
                const debt = parseFloat(document.getElementById(`debt_${id}`).value) || 0;
                const paid = parseFloat(document.getElementById(`paid_${id}`).value) || 0;
                const newTotal = (c.totalDebt || 0) + debt - paid;
                document.getElementById(`new_${id}`).innerHTML = newTotal.toLocaleString();
            }
        }

        async function updateCustomer(id) {
            const c = customers.find(c => c.id == id);
            if (c) {
                c.phone = document.getElementById(`phone_${id}`).value;
                c.totalDebt = parseFloat(document.getElementById(`balance_${id}`).value) || 0;
                const debt = parseFloat(document.getElementById(`debt_${id}`).value) || 0;
                const paid = parseFloat(document.getElementById(`paid_${id}`).value) || 0;
                
                if (debt > 0) c.totalDebt += debt;
                if (paid > 0) c.totalDebt -= paid;
                
                document.getElementById(`debt_${id}`).value = 0;
                document.getElementById(`paid_${id}`).value = 0;
                document.getElementById(`balance_${id}`).value = c.totalDebt;
                
                await saveData();
                renderTable();
                alert(`✅ تم تحديث ${c.name}`);
            }
        }

        function sendWA(id) {
            const c = customers.find(c => c.id == id);
            if (c && c.phone) {
                let msg = `السلام عليكم يا ${c.name}، رصيدك الحالي: ${(c.totalDebt || 0).toLocaleString()} ريال\n🏥 صيدلية العابد`;
                let phone = c.phone.replace(/^0+/, '').replace(/^967/, '').replace(/[^0-9]/g, '');
                window.open(`https://wa.me/967${phone}?text=${encodeURIComponent(msg)}`, '_blank');
            } else {
                alert('❌ رقم الهاتف غير موجود');
            }
        }

        async function sendGroupWA() {
            let targets = customers.filter(c => c.phone && c.phone.length >= 9);
            if (!targets.length) {
                alert('❌ لا توجد أرقام هواتف صحيحة');
                return;
            }
            
            for (let i = 0; i < targets.length; i++) {
                const c = targets[i];
                let msg = `السلام عليكم يا ${c.name}، رصيدك الحالي: ${(c.totalDebt || 0).toLocaleString()} ريال\n🏥 صيدلية العابد`;
                let phone = c.phone.replace(/^0+/, '').replace(/^967/, '').replace(/[^0-9]/g, '');
                window.open(`https://wa.me/967${phone}?text=${encodeURIComponent(msg)}`, '_blank');
                
                if (i < targets.length - 1) {
                    await new Promise(resolve => {
                        alert(`✅ تم إرسال رسالة لـ ${c.name}\nاضغط OK للمتابعة للعميل التالي`);
                        resolve();
                    });
                }
            }
            alert('✅ تم إرسال الرسائل لجميع العملاء');
        }

        async function addCustomer() {
            let name = prompt('📝 اسم العميل:');
            if (!name) return;
            let phone = prompt('📞 رقم الهاتف:');
            if (!phone) return;
            let id = Date.now();
            customers.push({
                id: id,
                name: name,
                phone: phone.replace(/[^0-9]/g, ''),
                totalDebt: 0,
                debt: 0,
                paid: 0
            });
            await saveData();
            renderTable();
            alert('✅ تم إضافة العميل');
        }

        function exportExcel() {
            if (!customers.length) {
                alert('لا يوجد بيانات');
                return;
            }
            let csv = "رقم العميل,اسم العميل,رقم الهاتف,الرصيد\n";
            for (let c of customers) {
                csv += `${c.id},${c.name},${c.phone},${c.totalDebt}\n`;
            }
            const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `customers_${new Date().toISOString().slice(0,19)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        window.updateCustomer = updateCustomer;
        window.sendWA = sendWA;
        window.addCustomer = addCustomer;
        window.sendGroupWA = sendGroupWA;
        window.exportExcel = exportExcel;

        loadData();
    </script>
</body>
</html>
